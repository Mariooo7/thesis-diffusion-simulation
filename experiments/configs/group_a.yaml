# 实验配置文件 - 组 A (小世界 + 强情感)

group: A
description: "小世界网络 + 强情感口碑"

# 网络配置
network:
  type: "small_world"  # small_world | random
  n_nodes: 100  # 简化：从 200 减少到 100，符合 ABM 标准实践 (Gilbert, 2008; JASSS 2023)
  avg_degree: 8
  rewiring_prob: 0.1

# 口碑语义配置
wom:
  strength: "strong"  # strong | weak
  emotion_arousal: 0.8  # 0-1, high for strong
  valence: "positive"  # positive | negative | neutral

# Bass 模型参数
bass:
  innovation_coef: 0.01  # p
  imitation_coef: 0.3    # q

# 仿真配置
simulation:
  n_steps: 60  # 简化：从 100 减少到 60，扩散曲线通常在 50-60 步达到稳定
  n_repetitions: 15  # 简化：从 20 减少到 15，ABM 标准建议 (Gilbert, 2008)
  seed: 42
  use_llm: true  # true=使用 LLM, false=使用启发式
  llm_sampling_ratio: 1.0  # 100% 决策使用 LLM（保持研究设计）
  
# LLM 配置 (可选)
llm:
  provider: "dashscope"  # dashscope | openai
  model: "qwen3.5-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # api_key: ${LLM_API_KEY}  # 从环境变量读取

# 输出配置
output:
  save_raw: true
  save_processed: true
  log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR
